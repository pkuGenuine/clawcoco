# Base directory for repos and skills
# Structure:
#   data_dir/
#     skills/
#       github-collaboration/
#         SKILL.md
#     repos/
#       {org}/
#         {repo}/
#     db/
#       sessions.db
data_dir = "/var/lib/clawcoco"

# Backend: "openclaw" or "claude_sdk"
backend_type = "claude_sdk"

[webhook]
secret = "test-secret-123"
port = 8080
debug = true

[github]
authorized_users = "pkuGenuine"
assistant_account = "genuineClaw"

[openclaw]
agent_id = "coder"

[claude_sdk]
model = "glm-5"
allowed_tools = ["Skill", "Read", "Edit", "Write", "Bash", "Glob", "Grep"]
