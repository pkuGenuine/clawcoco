# Base directory for repos and skills
# Structure:
#   data_dir/
#     skills/
#       github-collaboration/
#         SKILL.md
#     repos/
#       {org}/
#         {repo}/
#     db/
#       sessions.db
data_dir = "/var/lib/clawcoco"

# Backend: "openclaw" or "claude_sdk"
backend_type = "claude_sdk"

[webhook]
secret = "test-secret-123"
port = 8080
debug = true
github_ips_only = false  # Set to true in production

[github]
authorized_users = ["testuser"]  # Replace with your GitHub username
assistant_account = "claude-bot"  # Your agent's GitHub account
assistant_account_token = "ghp_xxx"  # GitHub token for agent account (repo scope)

[openclaw]
agent_id = "coder"

[claude_sdk]
model = "glm-5"
allowed_tools = ["Skill", "Read", "Edit", "Write", "Bash", "Glob", "Grep"]
